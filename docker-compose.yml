services:
  postgres:
    image: postgres:18.2
    container_name: guanyu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: guanyu
      POSTGRES_USER: guanyu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - guanyu-postgres:/var/lib/postgresql
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - effective_cache_size=2GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guanyu -d guanyu"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  guanyu:
    image: ghcr.io/zyk1172/guanyu:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    container_name: guanyu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://guanyu:${POSTGRES_PASSWORD}@postgres:5432/guanyu?schema=public&connection_limit=10&pool_timeout=20
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      TZ: Asia/Shanghai
    ports:
      - "5000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  guanyu-postgres:
