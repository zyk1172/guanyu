services:
  guanyu-postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.2}
    container_name: guanyu-postgres
    restart: unless-stopped
    env_file:
      - .env.qnap
    environment:
      POSTGRES_DB: guanyu
      POSTGRES_USER: guanyu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - /share/SSD/container/guanyu/postgres:/var/lib/postgresql
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=8MB
      - -c
      - effective_cache_size=2GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guanyu -d guanyu"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  guanyu:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-alpine}
    image: guanyu:latest
    container_name: guanyu
    restart: unless-stopped
    env_file:
      - .env.qnap
    network_mode: host
    depends_on:
      guanyu-postgres:
        condition: service_healthy
    volumes:
      - /share/SSD/container/guanyu/data:/app/data
    environment:
      NODE_ENV: production
      TZ: Asia/Shanghai
      PORT: 5000
      HOSTNAME: 0.0.0.0
      OPENAI_BASE_URL: http://127.0.0.1:3000/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
